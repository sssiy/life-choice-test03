<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>你该分手吗？</title>
  <meta name="description" content="给想分手但舍不得的人做的关系决策测试，分析继续和分开的利弊、修复可能性和安全边界。" />
  <style>
    :root{--bg:#f6f1ea;--paper:#fffdf8;--ink:#18242a;--muted:#68767d;--line:#ddd0c0;--accent:#7a3f46;--accent2:#315f66;--soft:#f7e8e5;--shadow:0 18px 38px rgba(24,36,42,.08)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:#e8ded2;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}button{font:inherit;color:inherit}.shell{width:min(100%,480px);min-height:100vh;margin:0 auto;padding:28px 20px 34px;background:linear-gradient(rgba(122,63,70,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(122,63,70,.05) 1px,transparent 1px),var(--bg);background-size:24px 24px}.topline{text-align:center;color:var(--accent);font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}h1,h2,h3,p{margin:0;letter-spacing:0}.hero-title{margin-top:22px;font-size:31px;line-height:1.2;text-align:center}.keep{white-space:nowrap}.subtitle{max-width:410px;margin:18px auto 0;color:var(--muted);font-size:15px;line-height:1.75;text-align:center}.subtitle span{display:block}.divider{width:64px;height:1px;margin:28px auto;background:var(--line)}.panel,.card,.option{background:rgba(255,253,248,.95);border:1px solid var(--line);box-shadow:var(--shadow)}.panel{margin-top:28px;padding:20px;border-radius:8px}.panel p{color:rgba(24,36,42,.82);font-size:14px;line-height:1.85}.panel p+p{margin-top:12px}.chips{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:24px}.chip{border:1px solid var(--line);padding:10px;background:rgba(255,255,255,.5);color:var(--muted);font-size:13px;text-align:center}.primary,.ghost{width:100%;min-height:48px;border-radius:4px;border:1px solid var(--ink);cursor:pointer}.primary{background:var(--ink);color:#fffdf8;font-weight:900}.ghost{background:transparent}.fineprint{margin-top:18px;color:var(--muted);font-size:12px;line-height:1.7;text-align:center}.progress{height:6px;background:#e6dace;border-radius:99px;overflow:hidden}.progress span{display:block;height:100%;background:var(--accent);transition:width .25s ease}.quiz-head{display:flex;align-items:center;justify-content:space-between;margin-top:18px;color:var(--muted);font-size:13px}.module{margin-top:22px;color:var(--accent);font-size:13px;font-weight:900}.question{margin-top:10px;font-size:22px;line-height:1.45}.options{display:grid;gap:12px;margin-top:22px}.option{width:100%;min-height:68px;padding:16px;border-radius:7px;text-align:left;cursor:pointer}.option strong{display:inline-flex;width:24px;height:24px;align-items:center;justify-content:center;margin-right:8px;border:1px solid var(--line);color:var(--accent);font-size:12px;vertical-align:top}.option span{display:inline-block;width:calc(100% - 36px);font-size:15px;line-height:1.55;vertical-align:top}.nav{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}.loader{min-height:100vh;display:flex;flex-direction:column;justify-content:center}.spinner{width:48px;height:48px;margin:0 auto 28px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.loading{text-align:center;color:var(--accent);font-weight:900;line-height:1.7;min-height:54px}.result-label{color:var(--accent);font-size:14px;font-weight:900}.result-title{margin-top:8px;font-size:30px;line-height:1.2}.result-subtitle{margin-top:12px;color:var(--muted);line-height:1.75}.indices{display:grid;gap:10px;margin-top:20px}.index{padding:14px;border:1px solid var(--line);background:var(--paper)}.index b{display:block;color:var(--accent);font-size:24px}.index span{display:block;margin-top:4px;color:var(--muted);font-size:12px}.card{margin-top:16px;padding:18px;border-radius:8px}.card h3{margin-bottom:10px;font-size:17px}.card p,.card li{color:var(--muted);font-size:14px;line-height:1.8}.card ul{margin:8px 0 0;padding-left:18px}.compare{display:grid;gap:12px}.compare-item{padding:14px;border:1px solid var(--line);background:rgba(247,232,229,.66)}.compare-item b{display:block;margin-bottom:6px}.share{margin-top:18px;padding:18px;border:1px solid var(--accent);background:var(--soft)}.share b{display:block;margin-bottom:8px;color:var(--accent)}.warn{border-color:#b85b50;background:#fff3ef}.warn h3{color:#8d2f29}@media(min-width:760px){.shell{min-height:calc(100vh - 48px);margin-top:24px;margin-bottom:24px;border:1px solid var(--line)}}@media(max-width:390px){.hero-title{font-size:29px}.question{font-size:21px}}
  </style>
</head>
<body>
  <main id="app"></main>
  <script>
    const disclaimer = "本测试用于自我觉察和关系决策参考，不构成心理诊断、法律建议或安全评估。如果关系中存在暴力、威胁、跟踪、控制、强迫、财务剥削或人身安全风险，请优先联系可信亲友、当地紧急电话或专业机构。";
    const questions = [
      {m:"分手念头",q:"你第一次认真想分手，大概是因为什么？",o:[["A","反复吵架后觉得累，但也看到对方有想改变的时候"],["B","我越来越清楚这段关系不适合自己"],["C","我很痛苦，但一想到失去对方就受不了"],["D","对方的行为让我害怕、不安全或不被尊重"]]},
      {m:"分手念头",q:"如果今天真的分开，你最强烈的感受会是？",o:[["A","难过，但也想知道是不是还有修复空间"],["B","痛，但会有一种终于不用再耗下去的轻松"],["C","像戒断一样空，甚至会想立刻回头"],["D","担心对方反应、纠缠、威胁或报复"]]},
      {m:"分手念头",q:"你舍不得的核心原因更像？",o:[["A","过去确实有很多好的部分，不想轻易放弃"],["B","付出太多，承认不合适会很痛"],["C","离不开熟悉感、陪伴感和对方给过的爱"],["D","害怕分开后对方失控，或自己的生活被影响"]]},
      {m:"分手念头",q:"你现在最想得到的答案是？",o:[["A","这段关系还能不能修"],["B","我是不是该清醒离开"],["C","为什么我明明想分却分不掉"],["D","我怎样才能安全地结束或拉开距离"]]},
      {m:"关系质量",q:"你们的问题出现后，对方通常会？",o:[["A","有时逃避，但愿意沟通和调整"],["B","短暂改变，之后又回到原样"],["C","忽冷忽热，让我更想抓住他"],["D","否认、威胁、羞辱、控制或把责任全推给我"]]},
      {m:"关系质量",q:"这段关系里，你最常体验到的是？",o:[["A","有爱也有累，问题集中在沟通和相处方式"],["B","失望大于期待，消耗大于滋养"],["C","焦虑、等待、患得患失和反复确认"],["D","害怕、压抑、被监控或不敢做自己"]]},
      {m:"关系质量",q:"你们是否还有共同解决问题的能力？",o:[["A","有一点，只是需要更明确的方法和期限"],["B","很弱，很多承诺都没有落地"],["C","我总想解决，但对方一冷我就乱了"],["D","几乎没有，沟通会变成压迫或危险"]]},
      {m:"关系质量",q:"如果只看过去三个月，你会怎么评价这段关系？",o:[["A","有起伏，但不是完全没有好转可能"],["B","持续下滑，我越来越不像自己"],["C","像过山车，甜的时候很甜，痛的时候很痛"],["D","我的自由、尊严或安全感被明显削弱"]]},
      {m:"个人状态",q:"和对方在一起后，你对自己的感受是？",o:[["A","有时被支持，有时被消耗"],["B","自我价值感越来越低，情绪越来越沉"],["C","我的状态很大程度取决于对方今天爱不爱我"],["D","我变得小心翼翼，甚至不敢表达真实想法"]]},
      {m:"个人状态",q:"你最怕分手后出现什么？",o:[["A","后悔没有再努力一次"],["B","承认这段投入没有结果"],["C","孤独、想念、失控、忍不住复合"],["D","对方纠缠、威胁、报复或影响我的生活"]]},
      {m:"个人状态",q:"身边朋友怎么看这段关系？",o:[["A","有人觉得还能沟通，有人劝我再观察"],["B","多数人觉得我已经被消耗很久"],["C","他们劝我离开，但我总替对方解释"],["D","他们担心我的安全或提醒我要留证据"]]},
      {m:"个人状态",q:"如果把对方从生活里暂时拿掉 30 天，你觉得自己会？",o:[["A","难过，但可能更清楚自己要什么"],["B","慢慢恢复能量和判断"],["C","非常不安，可能频繁想联系"],["D","更安全，但需要保护隐私和生活秩序"]]},
      {m:"修复可能",q:"你认为关系修复的前提是什么？",o:[["A","双方愿意承认问题，并且有具体行动"],["B","我已经不太相信修复了，需要看持续证据"],["C","只要对方回来爱我，我就会心软"],["D","先停止伤害、控制和威胁，否则谈不上修复"]]},
      {m:"修复可能",q:"对方过去的改变通常持续多久？",o:[["A","如果有明确约定，能持续一段时间"],["B","很短，很快又重复原来的模式"],["C","甜的时候我就相信了，冷的时候又崩溃"],["D","改变常常伴随施压、责怪或让我闭嘴"]]},
      {m:"修复可能",q:"你愿意再给这段关系一次机会的条件是？",o:[["A","设定期限、问题清单和可观察行动"],["B","除非有长期稳定改变，否则不想继续"],["C","我没有条件，只是很难真的离开"],["D","必须先保证安全和边界，不私下硬谈"]]},
      {m:"修复可能",q:"你最担心自己误判的是？",o:[["A","明明还能修，却因为累了就放弃"],["B","明明该走，却因为舍不得继续拖"],["C","把依恋、习惯和戒断感误以为爱"],["D","低估危险或继续被控制"]]},
      {m:"利弊权衡",q:"继续在一起，最大的好处是？",o:[["A","有机会修复，也保留曾经真实的感情"],["B","暂时不用面对分开的痛和生活变化"],["C","不用经历失去对方的强烈戒断感"],["D","可以暂时避免对方激烈反应"]]},
      {m:"利弊权衡",q:"继续在一起，最大的代价是？",o:[["A","如果不设期限，会继续模糊地耗下去"],["B","继续失去时间、能量和自尊"],["C","越来越依赖对方给的情绪波动"],["D","安全、自由或尊严继续受损"]]},
      {m:"利弊权衡",q:"分开，最大的好处是？",o:[["A","给彼此空间，看清真实需要"],["B","停止消耗，重新把生活还给自己"],["C","有机会从依恋拉扯里醒过来"],["D","降低风险，重新建立安全边界"]]},
      {m:"利弊权衡",q:"分开，最大的难点是？",o:[["A","怕自己没有验证完就后悔"],["B","要承受失落和沉没成本"],["C","戒断感、想念和复合冲动"],["D","需要安全计划、证据和外部支持"]]},
      {m:"边界与安全",q:"对方是否尊重你说“不”？",o:[["A","大多数时候尊重，但需要提醒"],["B","常常嘴上尊重，实际继续越界"],["C","只要对方一难过，我就会收回边界"],["D","不尊重，甚至会用威胁或惩罚逼我妥协"]]},
      {m:"边界与安全",q:"你有没有因为这段关系减少社交、改变穿着、隐瞒行踪或失去自由？",o:[["A","有一点，但还能沟通"],["B","有，而且我越来越不舒服"],["C","有时是我主动迎合，怕对方不开心"],["D","明显有，对方会检查、限制或施压"]]},
      {m:"边界与安全",q:"如果你提出分手，对方最可能？",o:[["A","难过，但还能沟通"],["B","挽回、承诺改变，但未必持久"],["C","忽冷忽热，让我更难离开"],["D","威胁、自伤、报复、纠缠或公开羞辱"]]},
      {m:"下一步",q:"此刻最适合你的下一步更像？",o:[["A","做一次有期限的修复观察"],["B","制定清醒告别计划"],["C","先处理依恋戒断和复合冲动"],["D","优先做安全分离和支持系统"]]}
    ].map((x,i)=>({id:i+1,module:x.m,text:x.q,options:x.o.map(([type,text],idx)=>({key:"ABCD"[idx],type,text}))}));
    const results = {
      A:{name:"有期限修复型",sub:"你不是不该分，而是还需要一次有边界、有期限、有证据的修复观察。",idx:[["修复可能",78],["分手冲动",58],["安全风险",24]],core:"你们之间仍有一些可修复的基础：感情不是完全枯竭，问题也不一定来自恶意和控制。真正的关键是，不能再靠情绪、道歉和短暂热情维持关系，而要看双方能不能持续改变具体行为。",why:"你舍不得的不是单纯习惯，而是你确实记得这段关系里有过真实连接、支持和美好。你害怕的是，如果没有再验证一次就分开，自己会被后悔困住。",share:"我是有期限修复型：不是盲目继续，而是给关系最后一次有证据的观察。"},
      B:{name:"清醒告别型",sub:"你已经不是一时冲动想分，而是在长期消耗后越来越清楚自己需要离开。",idx:[["消耗程度",88],["修复信任",34],["离开必要",84]],core:"你的答案显示，这段关系带来的失望、疲惫和自我损耗已经明显超过滋养。你舍不得很正常，因为感情投入不会因为一个决定立刻归零，但舍不得不等于还适合继续。",why:"你舍不得的核心多半是沉没成本、共同记忆、对过去版本的对方仍有感情，以及不愿承认自己爱过的人并没有给出匹配的关系。",share:"我是清醒告别型：我舍不得，但我更不能继续把自己耗在没有结果的关系里。"},
      C:{name:"依恋戒断型",sub:"你最难的不是判断该不该分，而是承受分开后的戒断感和失控感。",idx:[["依恋拉扯",93],["边界稳定",36],["复合冲动",90]],core:"你的痛苦很可能来自焦虑型依恋、间歇性强化或长期忽冷忽热。你明知道这段关系让你难受，却在对方一靠近、一示好、一解释时立刻心软。此时最重要的不是立刻逼自己彻底放下，而是先让神经系统从拉扯里降下来。",why:"你舍不得的可能不是现在这段关系本身，而是舍不得那个被爱过的感觉、对方偶尔给你的高峰体验，以及你为这段关系想象过的未来。",share:"我是依恋戒断型：我不是不知道痛，只是离开时的戒断感太强。"},
      D:{name:"安全止损型",sub:"这已经不只是感情合不合适的问题，而是边界、安全和尊严需要被优先保护。",idx:[["安全警报",94],["控制风险",88],["外部支持",82]],core:"你的答案里出现了明显的安全或控制信号。此时不建议把重点放在“我还爱不爱”或“还能不能修”，而要先确认自己能否安全拉开距离。任何暴力、威胁、羞辱、控制、跟踪、强迫、财务限制、自伤威胁，都不是普通情侣磨合。",why:"你舍不得可能混合了害怕、内疚、被控制后的自我怀疑，以及对方偶尔温柔时带来的希望。越是这种关系，越容易让人把危险误认为深情。",share:"我是安全止损型：这不是我够不够爱的问题，而是我需要先保护自己。"}
    };
    const details = {
      A:{continueGood:["保留真实感情，不在疲惫时草率切断。","有机会验证双方是否真的愿意学习沟通、承担责任和改变行为。","如果修复成功，关系会从靠感觉进入靠规则和行动。"],continueBad:["如果不设期限，会变成无限拖延。","对方短暂变好容易让你忽略长期模式。","你可能继续用希望抵消现实证据。"],breakGood:["短暂拉开距离，能让你看清自己是爱对方，还是害怕失去。","如果对方只在失去时才改变，分开能暴露真实动机。","你能重新恢复自己的节奏和判断。"],breakBad:["如果没有充分沟通，你可能反复后悔。","双方仍有修复意愿时，直接分开会留下未完成感。","共同生活、社交圈或现实安排需要处理。"],evidence:["对方能否承认具体问题，而不是只说“我以后会改”。","改变能否持续 30 天以上，而不是靠一次道歉。","你表达不舒服后，对方是否愿意尊重，而不是反过来指责你。"],plan:["列一张问题清单，只写可观察行为，比如冷暴力、失约、回避沟通。","和对方约定 30 天观察期，每周复盘一次，不靠情绪判断。","如果 30 天后仍重复核心问题，就把分开作为认真选项。"],talk:["我不是想用分手威胁你，我是想确认这段关系是否还能变好。","我需要看到具体行动，而不只是道歉和保证。","如果这些问题继续重复，我会考虑结束关系。"],avoid:["不要把观察期拖成无限期。","不要只看对方说什么，要看重复行为。","不要为了证明自己善良而忽略自己的痛苦。"]},
      B:{continueGood:["暂时不用承受分手的痛和生活重组。","还能保留熟悉感、陪伴感和过去的回忆。","如果现实牵连较多，可以争取时间安排过渡。"],continueBad:["继续消耗自尊、情绪和时间。","你会越来越不相信自己的判断。","对方可能习惯你一次次退让，关系模式更难改变。"],breakGood:["停止长期消耗，把注意力还给自己。","让你从反复失望里出来，重新建立自我价值感。","你有机会遇到更稳定、更尊重你的关系。"],breakBad:["会有失落、孤独和沉没成本带来的痛。","需要处理共同物品、社交圈、租房或经济安排。","短期会想起好时刻，容易怀疑自己是不是太狠心。"],evidence:["核心问题是否重复超过三次，并且每次都没有真正改变。","你是否为了维持关系牺牲了睡眠、工作、朋友或尊严。","想到继续一年，你的身体反应是安心还是窒息。"],plan:["先写一封不一定发送的分手信，帮自己理清为什么要离开。","制定分手后的 14 天安排：住处、朋友陪伴、工作节奏、情绪出口。","减少单独深夜沟通，避免在情绪峰值被挽回带走。"],talk:["我认真想过了，这段关系已经让我长期不快乐。","我感谢我们有过好的部分，但我不想继续重复同样的问题。","这不是一次争吵后的气话，而是我做出的决定。"],avoid:["不要在对方哭、求、承诺时立刻推翻决定。","不要用“再等等”逃避痛感。","不要把分手说成全是自己的错，以免被拉回旧模式。"]},
      C:{continueGood:["能暂时缓解失去对方的恐慌。","还能获得对方偶尔的关心、甜蜜和确认。","不用马上面对空窗期和戒断反应。"],continueBad:["间歇性甜蜜会强化依赖，让你更难离开。","你的情绪会继续被对方的冷热牵着走。","你会把痛苦误解成爱得深，把焦虑误解成离不开。"],breakGood:["让大脑和身体从反复拉扯里慢慢降下来。","重新找回自己的生活节奏和自我感。","你能分清真正的爱和戒断感。"],breakBad:["前 7 到 21 天可能非常难熬，想联系、想复合、想自责。","你会反复美化过去，忘记真实伤害。","如果没有支持系统，容易在深夜回头。"],evidence:["对方忽冷忽热后，你是否更上瘾而不是更安心。","你是否把全部生活重心放在对方回应上。","你是否明知道不适合，却无法停止等待和解释。"],plan:["先做 14 天低联系或不联系实验，把聊天记录、照片、动态入口暂时隐藏。","把想联系对方的冲动写下来，延迟 30 分钟再决定。","每天安排一个稳定支点：朋友、运动、工作、睡眠或咨询。"],talk:["我现在需要拉开距离，不是为了惩罚你，而是为了恢复判断力。","这段时间请不要用忽冷忽热的方式联系我。","如果我想复合，我会在状态稳定后再讨论，而不是在崩溃时决定。"],avoid:["不要在戒断最强的时候谈复合。","不要反复看聊天记录自我刺激。","不要把一次温柔当成关系已经变好。","不要用新的人立刻填补空洞。"]},
      D:{continueGood:["短期可能避免对方立刻激烈反应。","你能争取时间准备证据、住处、财务和支持系统。","如果目前风险很高，表面维持可能是一种过渡策略。"],continueBad:["控制和威胁可能升级。","你会越来越怀疑自己，边界被进一步削弱。","孤立、财务限制或情绪操控会让离开更难。"],breakGood:["优先保护人身安全、隐私和尊严。","让你重新获得自由、社交和生活控制权。","停止把危险解释成爱。"],breakBad:["需要更谨慎的安全计划，不能只靠当面摊牌。","可能需要外部支持、证据保存和现实资源。","对方可能纠缠或施压，需要提前准备应对。"],evidence:["对方是否检查手机、限制社交、控制金钱或行踪。","提出分手时是否出现威胁、自伤、报复或公开羞辱。","你是否因为害怕对方反应而不敢表达真实想法。"],plan:["先告诉可信亲友真实情况，不要独自承受。","保存关键证据：聊天记录、转账、威胁、受伤照片、报警或就医记录。","优先安排住处、财务、证件、隐私和联系方式安全。"],talk:["如果有安全风险，不建议单独当面分手。可以用简短、明确、低刺激的方式通知。","我决定结束关系，请不要再联系我。后续物品交接通过第三方处理。","如果你继续威胁或纠缠，我会寻求外部帮助。"],avoid:["不要单独去封闭空间谈分手。","不要把对方威胁自伤当成你必须留下的理由，应联系其亲友或专业机构。","不要提前透露所有计划。","不要为了安抚对方暴露新住址、行程或隐私。"]}
    };
    const mixed = {AB:"你在修复和告别之间摇摆。建议用 30 天观察期收集证据，不再只凭情绪判断。",AC:"你仍想修复，但依恋拉扯很强。先降温、拉开距离，再判断是否真的值得修。",AD:"你希望修复，但出现安全信号。先保护边界和安全，不要用修复掩盖风险。",BA:"你倾向离开，但害怕没有再努力。可以做一次短期限验证，期限结束按证据行动。",BC:"你知道该走，却很难承受戒断。重点不是说服自己，而是设计不复合的支持系统。",BD:"你倾向告别，且有风险信号。请把安全计划放在情绪沟通之前。",CA:"你舍不得很强，也还有修复幻想。建议先低联系 14 天，再判断修复是否真实。",CB:"你不是不清醒，而是戒断感太强。先让自己撑过高峰，再做决定。",CD:"依恋和安全风险交织。不要独自处理，优先找可信亲友或专业支持。",DA:"你想相信还能修，但安全边界已被触碰。修复必须以停止伤害为前提。",DB:"你已经看见离开必要，也看见风险。安全分离比讲清道理更重要。",DC:"你既害怕又离不开，这很常见。请先建立外部支持，不要独自硬扛。"};
    const loading = ["正在识别你的舍不得来自哪里...","正在评估修复可能性...","正在拆解继续和分开的利弊...","正在生成关系决策报告...","分析完成。"];
    let state={screen:"home",i:0,answers:[],load:0}; const app=document.getElementById("app");
    function shell(html){app.innerHTML=`<section class="shell">${html}</section>`}
    function home(){state={screen:"home",i:0,answers:[],load:0};shell(`<div class="topline">Relationship Decision Test</div><h1 class="hero-title"><span class="keep">你该分手吗？</span><br><span class="keep">还是再观察一次？</span></h1><p class="subtitle"><span>给那些想分手</span><span>但又舍不得的人</span><span>24 道题，帮你看清继续和分开</span><span>各自真正的代价</span></p><div class="divider"></div><div class="panel"><p>有些人不是不爱了，只是一次次失望后真的累了。 有些人不是不清醒，只是一想到分开就像戒断一样痛。 有些人明知道该走，却总被回忆、内疚和对方偶尔的温柔拉回去。</p><p>这个测试不会粗暴劝你分，也不会劝你硬扛。它会帮你分辨：这段关系是还能修、该告别、陷入依恋戒断，还是已经触碰安全边界。</p></div><div class="chips"><div class="chip">24 道题</div><div class="chip">4 种结果</div><div class="chip">利弊分析</div><div class="chip">行动建议</div></div><div style="margin-top:26px"><button class="primary" id="start">开始测试</button></div><p class="fineprint">${disclaimer}</p>`);document.getElementById("start").onclick=quiz}
    function quiz(){state.screen="quiz";const q=questions[state.i],pct=Math.round(state.i/questions.length*100);shell(`<div class="progress"><span style="width:${pct}%"></span></div><div class="quiz-head"><span>第 ${state.i+1} / ${questions.length} 题</span><span>约 6 分钟</span></div><div class="module">${q.module}</div><h2 class="question">${q.text}</h2><div class="options">${q.options.map((o,n)=>`<button class="option" data-n="${n}"><strong>${o.key}</strong><span>${o.text}</span></button>`).join("")}</div><div class="nav"><button class="ghost" id="back">${state.i===0?"返回首页":"上一题"}</button><button class="ghost" id="restart">重新开始</button></div><p class="fineprint">选择最接近你真实状态的一项，不用选择“应该选”的答案。</p>`);document.querySelectorAll(".option").forEach(b=>b.onclick=()=>{state.answers[state.i]=q.options[+b.dataset.n]; if(state.i<questions.length-1){state.i++;quiz()}else load()});document.getElementById("back").onclick=()=>{if(state.i===0)home();else{state.i--;quiz()}};document.getElementById("restart").onclick=home}
    function load(){state.screen="load";state.load=0;shell(`<div class="loader"><div class="spinner"></div><p class="loading" id="lt">${loading[0]}</p></div>`);const timer=setInterval(()=>{state.load++; if(state.load>=loading.length){clearInterval(timer);result()}else document.getElementById("lt").textContent=loading[state.load]},520)}
    function score(){const c={A:0,B:0,C:0,D:0};state.answers.forEach(a=>c[a.type]++);const s=Object.entries(c).sort((a,b)=>b[1]-a[1]);return{p:s[0][0],sec:s[0][1]-s[1][1]<=2?s[1][0]:null,c}}
    function list(items){return `<ul>${items.map(x=>`<li>${x}</li>`).join("")}</ul>`}
    function compare(title,good,bad){return `<div class="card"><h3>${title}</h3><div class="compare"><div class="compare-item"><b>可能的好处</b>${list(good)}</div><div class="compare-item"><b>可能的代价</b>${list(bad)}</div></div></div>`}
    function result(){const sc=score(),r=results[sc.p],d=details[sc.p],mix=sc.sec?mixed[sc.p+sc.sec]:"";shell(`<div class="result-label">你的关系决策倾向</div><h1 class="result-title">${r.name}</h1><p class="result-subtitle">${r.sub}</p><div class="indices">${r.idx.map(x=>`<div class="index"><b>${x[1]}</b><span>${x[0]}</span></div>`).join("")}</div>${mix?`<div class="card"><h3>混合倾向提示</h3><p>${mix}</p></div>`:""}<div class="card"><h3>核心诊断</h3><p>${r.core}</p></div><div class="card"><h3>你为什么会舍不得</h3><p>${r.why}</p></div>${compare("如果继续，会得到什么，又会付出什么",d.continueGood,d.continueBad)}${compare("如果分开，会得到什么，又会付出什么",d.breakGood,d.breakBad)}<div class="card"><h3>判断这段关系的关键证据</h3>${list(d.evidence)}</div><div class="card"><h3>30 天行动计划</h3>${list(d.plan)}</div><div class="card"><h3>可以参考的沟通句式</h3>${list(d.talk)}</div><div class="card"><h3>最容易踩的坑</h3>${list(d.avoid)}</div><div class="card"><h3>心理学参考框架</h3><p>本测试参考依恋理论、沉没成本谬误、间歇性强化、关系投资模型、边界理论、决策平衡表和亲密关系安全边界。它的目的不是替你做决定，而是帮你把“舍不得”拆开，看清里面分别是爱、习惯、内疚、恐惧、希望，还是风险。</p></div><div class="card warn"><h3>安全提醒</h3><p>如果你遇到暴力、威胁、跟踪、控制、强迫、隐私泄露、财务限制或自伤威胁，不要把它当成普通感情问题。请优先联系可信亲友、当地紧急电话或专业机构，不建议独自当面谈分手。</p></div><div class="share"><b>可截图分享</b><p>${r.share}</p></div><div style="display:grid;gap:12px;margin-top:18px"><button class="primary" id="retake">重新测试</button><button class="ghost" id="home">回到首页</button></div><p class="fineprint">${disclaimer}</p>`);document.getElementById("retake").onclick=()=>{state={screen:"quiz",i:0,answers:[],load:0};quiz()};document.getElementById("home").onclick=home}
    home();
  </script>
</body>
</html>
